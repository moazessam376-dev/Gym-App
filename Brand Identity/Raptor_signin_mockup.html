<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raptor — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #0A0B0F; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; display: flex; justify-content: center; min-height: 100vh; }
  .phone { width: 390px; background: #0A0B0F; border: 10px solid #1A1B22; border-radius: 44px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6); position: relative; min-height: 720px; }
  .status-bar { height: 42px; display: flex; align-items: center; justify-content: space-between; padding: 0 26px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #C3C6CE; }
  .status-bar .brand { font-family: 'Geist', sans-serif; font-weight: 700; color: #F5F6F8; }
  .status-bar .signal { color: #3FD9C0; }
  .content { padding: 0 24px 40px; }

  .logo-block { text-align: center; padding: 30px 0 36px; }
  .logo { font-family: 'Geist', sans-serif; font-weight: 900; font-size: 56px; letter-spacing: -2.5px; color: #F5F6F8; line-height: 1; }
  .logo .accent { color: #3FD9C0; }
  .tagline { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7E828D; margin-top: 10px; }

  .form-group { margin-bottom: 16px; }
  .form-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #9B9CA8; margin-bottom: 7px; display: block; }
  .form-input { width: 100%; background: #0E0F14; border: 1px solid #2A2B38; border-radius: 11px; padding: 15px; font-family: 'Inter', sans-serif; font-size: 15px; color: #F5F6F8; }
  .form-input:focus { outline: none; border-color: #3FD9C0; box-shadow: 0 0 0 3px rgba(63,217,192,0.12); }
  .form-input::placeholder { color: #5C616E; }

  .forgot-link { text-align: right; margin: -4px 0 20px; }
  .forgot-link a { font-family: 'Inter', sans-serif; font-size: 13px; color: #3FD9C0; text-decoration: none; }

  .btn-primary { width: 100%; background: #3FD9C0; color: #0A0B0F; font-family: 'Geist', sans-serif; font-weight: 700; font-size: 15px; text-align: center; border-radius: 13px; padding: 16px; border: none; display: block; margin-bottom: 20px; }

  .divider { display: flex; align-items: center; gap: 14px; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: #2A2B38; }
  .divider-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #5C616E; }

  .oauth-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .oauth-btn { background: #15161D; border: 1px solid #2A2B38; border-radius: 11px; padding: 13px; text-align: center; font-family: 'Geist', sans-serif; font-weight: 600; font-size: 14px; color: #F5F6F8; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .oauth-btn .icon { font-size: 16px; }

  .signup-cta { text-align: center; font-family: 'Inter', sans-serif; font-size: 14px; color: #7E828D; }
  .signup-cta a { color: #3FD9C0; text-decoration: none; font-weight: 600; }

  .page-context { width: 390px; padding: 30px 0 16px; text-align: center; }
  .page-context .tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #3FD9C0; }
  .page-context .title { font-family: 'Geist', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.8px; color: #F5F6F8; margin-top: 6px; }
  .page-context .sub { font-family: 'Inter', sans-serif; font-size: 13px; color: #9B9CA8; margin-top: 4px; }
  .wrapper { display: flex; flex-direction: column; align-items: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="page-context">
    <div class="tag">Sign In · Remake</div>
    <div class="title">Raptor Design System v1</div>
    <div class="sub">Mobile screen · 390px · Dark canonical</div>
  </div>
  <div class="phone">
    <div class="status-bar"><span>9:41</span><span class="brand">Raptor</span><span class="signal">●●●</span></div>
    <div class="content">
      <div class="logo-block">
        <div class="logo">Raptor<span class="accent">.</span></div>
        <div class="tagline">Earned, not given</div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" placeholder="••••••••">
      </div>
      <div class="forgot-link"><a href="#">Forgot password?</a></div>

      <button class="btn-primary">Sign In</button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">Or continue with</div>
        <div class="divider-line"></div>
      </div>

      <div class="oauth-row">
        <div class="oauth-btn"><span class="icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" style="width:1em;height:1em;vertical-align:-0.13em;"><path d="M21.4 11.1H12v2.8h5.4c-.3 1.4-1.7 4.1-5.4 4.1a5.9 5.9 0 0 1 0-11.8c1.7 0 2.9.7 3.5 1.4l2.4-2.3C16.4 3.7 14.5 2.8 12 2.8a9.2 9.2 0 1 0 0 18.4c5.3 0 8.8-3.7 8.8-9 0-.6-.1-1-.2-1.5z"/></svg></span> Google</div>
        <div class="oauth-btn"><span class="icon"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none" style="width:1em;height:1em;vertical-align:-0.13em;"><path d="M16.4 1.4c0 1.1-.4 2.2-1.1 3-.8.9-2.2 1.6-3.4 1.5-.1-1.1.4-2.3 1.1-3 .8-.9 2.3-1.6 3.4-1.5zM20.5 17.2c-.6 1.4-.9 2-1.7 3.2-1.1 1.7-2.6 3.9-4.4 3.9-1.7 0-2.1-1.1-4.3-1.1s-2.7 1.1-4.4 1.1c-1.9 0-3.3-2-4.4-3.7C-1 16.5-1.3 9.9 1.7 6.8c.9-1 2.3-1.6 3.6-1.6 1.7 0 2.8 1.1 4.2 1.1 1.3 0 2.2-1.1 4.2-1.1 1.2 0 2.5.7 3.5 1.8-3 1.7-2.5 6 1 7.3z"/></svg></span> Apple</div>
      </div>

      <div class="signup-cta">No account yet? <a href="#">Sign up</a></div>
    </div>
  </div>
</div>
</body>
</html>
