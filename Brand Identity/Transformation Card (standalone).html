document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ckground: rgba(63,217,192,0.3); color:#fff; }\n  image-slot { display:block; }\n<\u002Fstyle>\n<script src=\"9e3f0548-1c4c-437c-9dae-b81dbc69155a\"><\u002Fscript>\n<\u002Fhelmet>\n\n\n<div style=\"background:#08090C; color:#F5F6F8; font-family:'Inter',sans-serif; min-height:100vh; padding:0 0 120px; overflow-x:hidden;\">\n\n  <!-- ============ HEADER + CONTROLS ============ -->\n  <div style=\"max-width:1120px; margin:0 auto; padding:52px 40px 0;\">\n    <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:#3FD9C0; display:flex; align-items:center; gap:9px; margin-bottom:20px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3FD9C0;\"><\u002Fspan>Raptor · Shareable transformation card<\u002Fdiv>\n    <h1 style=\"font-family:'Geist',sans-serif; font-weight:800; font-size:52px; line-height:0.98; letter-spacing:-2px; margin:0 0 16px;\">Built to be screenshotted.<\u002Fh1>\n    <p style=\"font-size:15.5px; line-height:1.7; color:#9B9CA8; max-width:680px; margin:0;\">Two directions for the card people post to WhatsApp and Stories. Same data, same brand — onyx, Signal cyan, mono numbers. Format is a choice inside the app, so toggle it to preview each export. Drop your own before/after photos onto the slots.<\u002Fp>\n\n    <!-- controls -->\n    <div style=\"display:flex; flex-wrap:wrap; gap:28px; align-items:flex-end; margin-top:34px;\">\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#7E828D; margin-bottom:10px;\">Export format · in-app<\u002Fdiv>\n        <div style=\"display:inline-flex; gap:5px; background:#15161D; border:1px solid #2A2B38; border-radius:12px; padding:5px;\">\n          <div onclick=\"{{ setF1 }}\" style=\"cursor:pointer; font-family:'Geist'; font-weight:600; font-size:13px; padding:9px 17px; border-radius:8px; background:{{ f1Bg }}; color:{{ f1Fg }};\">Square<\u002Fdiv>\n          <div onclick=\"{{ setF2 }}\" style=\"cursor:pointer; font-family:'Geist'; font-weight:600; font-size:13px; padding:9px 17px; border-radius:8px; background:{{ f2Bg }}; color:{{ f2Fg }};\">Portrait<\u002Fdiv>\n          <div onclick=\"{{ setF3 }}\" style=\"cursor:pointer; font-family:'Geist'; font-weight:600; font-size:13px; padding:9px 17px; border-radius:8px; background:{{ f3Bg }}; color:{{ f3Fg }};\">Story<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#7E828D; margin-bottom:10px;\">Data state<\u002Fdiv>\n        <div style=\"display:inline-flex; gap:5px; background:#15161D; border:1px solid #2A2B38; border-radius:12px; padding:5px;\">\n          <div onclick=\"{{ setFull }}\" style=\"cursor:pointer; font-family:'Geist'; font-weight:600; font-size:13px; padding:9px 17px; border-radius:8px; background:{{ dFullBg }}; color:{{ dFullFg }};\">Full<\u002Fdiv>\n          <div onclick=\"{{ setMin }}\" style=\"cursor:pointer; font-family:'Geist'; font-weight:600; font-size:13px; padding:9px 17px; border-radius:8px; background:{{ dMinBg }}; color:{{ dMinFg }};\">Sparse<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:12px; color:#5C616E; padding-bottom:9px;\">Exports at <span style=\"color:#9B9CA8;\">{{ exportLabel }}<\u002Fspan> px<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"height:1px; background:#1C1D26; margin:40px 0 0;\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ TURN 1 · TWO DIRECTIONS ============ -->\n  <section style=\"max-width:1120px; margin:0 auto; padding:44px 40px 0;\">\n    <div style=\"display:flex; flex-wrap:wrap; gap:44px; align-items:flex-start; justify-content:center;\">\n\n      <!-- ========== OPTION 1A · LEDGER ========== -->\n      <div id=\"1a\" style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"display:flex; align-items:center; gap:12px;\">\n          <span style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:12px; letter-spacing:1px; color:#08090C; background:#3FD9C0; border-radius:7px; padding:5px 9px;\">1A<\u002Fspan>\n          <div>\n            <div style=\"font-family:'Geist'; font-weight:700; font-size:16px; color:#F5F6F8;\">Ledger<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono'; font-size:11px; color:#7E828D;\">Structured · the data does the talking<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"width:{{ dispW }}px; height:{{ dispH }}px; position:relative; overflow:hidden; border-radius:14px; box-shadow:0 30px 70px rgba(0,0,0,0.55);\">\n          <div style=\"width:1080px; height:{{ designH }}px; transform:scale({{ scale }}); transform-origin:top left; background:#0A0B0F; border:1px solid #23242F; border-radius:44px; padding:56px; display:flex; flex-direction:column;\">\n\n            <!-- header -->\n            <div style=\"display:flex; justify-content:space-between; align-items:flex-start;\">\n              <div>\n                <div style=\"font-family:'JetBrains Mono'; font-size:19px; letter-spacing:5px; text-transform:uppercase; color:#7E828D;\">Transformation<\u002Fdiv>\n                <div style=\"font-family:'Geist'; font-weight:800; font-size:66px; letter-spacing:-2px; line-height:1; color:#F5F6F8; margin-top:14px;\">{{ name }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#15161D; border:1px solid #2A2B38; border-radius:16px; padding:15px 19px;\">\n                <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:30px; color:#F5F6F8; line-height:1;\">{{ weeksLabel }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- photos -->\n            <div style=\"display:flex; gap:16px; flex:1; min-height:0; margin-top:32px;\">\n              <div style=\"flex:1; position:relative; border-radius:22px; overflow:hidden; background:#15161D; border:1px solid #23242F;\">\n                <image-slot id=\"a-before\" shape=\"rect\" placeholder=\"Before photo\" style=\"width:100%; height:100%;\"><\u002Fimage-slot>\n                <div style=\"position:absolute; top:18px; left:18px; font-family:'JetBrains Mono'; font-size:17px; letter-spacing:2px; color:#F5F6F8; background:rgba(8,9,12,0.66); border:1px solid rgba(255,255,255,0.12); border-radius:9px; padding:6px 12px;\">BEFORE<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; position:relative; border-radius:22px; overflow:hidden; background:#15161D; border:1px solid #23242F;\">\n                <image-slot id=\"a-after\" shape=\"rect\" placeholder=\"After photo\" style=\"width:100%; height:100%;\"><\u002Fimage-slot>\n                <div style=\"position:absolute; top:18px; left:18px; font-family:'JetBrains Mono'; font-size:17px; letter-spacing:2px; color:#0A0B0F; background:#3FD9C0; border-radius:9px; padding:6px 12px;\">AFTER<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- ledger -->\n            <div style=\"margin-top:34px;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:22px 0; border-top:1px solid #1C1D26;\">\n                <div style=\"font-family:'JetBrains Mono'; font-size:21px; letter-spacing:2px; text-transform:uppercase; color:#7E828D;\">Body fat<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:42px; color:{{ bfColor }}; line-height:1;\">{{ bfVal }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:22px 0; border-top:1px solid #1C1D26;\">\n                <div style=\"font-family:'JetBrains Mono'; font-size:21px; letter-spacing:2px; text-transform:uppercase; color:#7E828D;\">Lean mass<\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:42px; color:{{ lmColor }}; line-height:1;\">{{ lmVal }}<span style=\"font-size:24px; color:#7E828D; margin-left:5px;\">{{ lmUnit }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding:22px 0; border-top:1px solid #1C1D26;\">\n                <div style=\"font-family:'JetBrains Mono'; font-size:21px; letter-spacing:2px; text-transform:uppercase; color:#7E828D;\">Rank<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:14px;\">\n                  <sc-if value=\"{{ tierChanged }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex; align-items:center; gap:14px;\">\n                      <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:20px; letter-spacing:1px; color:#E5B83C; background:rgba(229,184,60,0.15); border-radius:9px; padding:9px 14px;\">GOLD<\u002Fspan>\n                      <span style=\"font-family:'JetBrains Mono'; font-size:22px; color:#3FD9C0;\">→<\u002Fspan>\n                      <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:20px; letter-spacing:1px; color:#CFE6F0; background:rgba(207,230,240,0.14); border-radius:9px; padding:9px 14px;\">PLATINUM<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ tierPlaceholder }}\" hint-placeholder-val=\"{{ true }}\">\n                    <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:20px; letter-spacing:1px; color:#7E828D; background:#15161D; border:1px solid #2A2B38; border-radius:9px; padding:9px 16px;\">—<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- caption + footer -->\n            <div style=\"margin-top:24px;\">\n              <div style=\"font-family:'Inter'; font-style:italic; font-size:23px; color:#9B9CA8; line-height:1.45;\">“Showed up every day. The data did the rest.”<\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:30px; padding-top:24px; border-top:1px solid #2A2B38;\">\n                <div style=\"font-family:'JetBrains Mono'; font-size:17px; letter-spacing:2px; color:#7E828D;\">COACHED BY MARIAM K.<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:11px;\">\n                  <span style=\"width:15px; height:15px; background:#3FD9C0; border-radius:4px; transform:rotate(45deg); box-shadow:0 0 14px rgba(63,217,192,0.6);\"><\u002Fspan>\n                  <span style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:22px; letter-spacing:4px; color:#3FD9C0;\">RAPTOR<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; align-items:center; margin-top:15px;\">\n                <span style=\"font-family:'JetBrains Mono'; font-size:16px; letter-spacing:2px; color:#5C616E;\">SEASON 02 · 2026<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono'; font-size:16px; letter-spacing:1px; color:#3FD9C0;\">train.raptor.app<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ========== OPTION 1B · FRAME ========== -->\n      <div id=\"1b\" style=\"display:flex; flex-direction:column; gap:18px;\">\n        <div style=\"display:flex; align-items:center; gap:12px;\">\n          <span style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:12px; letter-spacing:1px; color:#08090C; background:#3FD9C0; border-radius:7px; padding:5px 9px;\">1B<\u002Fspan>\n          <div>\n            <div style=\"font-family:'Geist'; font-weight:700; font-size:16px; color:#F5F6F8;\">Frame<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono'; font-size:11px; color:#7E828D;\">Image-led · editorial scrim<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"width:{{ dispW }}px; height:{{ dispH }}px; position:relative; overflow:hidden; border-radius:14px; box-shadow:0 30px 70px rgba(0,0,0,0.55);\">\n          <div style=\"width:1080px; height:{{ designH }}px; transform:scale({{ scale }}); transform-origin:top left; background:#0A0B0F; border:1px solid #23242F; border-radius:44px; overflow:hidden; display:flex; flex-direction:column;\">\n\n            <!-- photo hero -->\n            <div style=\"position:relative; flex:1; min-height:0; display:flex;\">\n              <div style=\"flex:1; overflow:hidden; background:#15161D;\">\n                <image-slot id=\"b-before\" shape=\"rect\" placeholder=\"Before photo\" style=\"width:100%; height:100%;\"><\u002Fimage-slot>\n              <\u002Fdiv>\n              <div style=\"width:3px; background:#3FD9C0; box-shadow:0 0 14px rgba(63,217,192,0.7);\"><\u002Fdiv>\n              <div style=\"flex:1; overflow:hidden; background:#15161D;\">\n                <image-slot id=\"b-after\" shape=\"rect\" placeholder=\"After photo\" style=\"width:100%; height:100%;\"><\u002Fimage-slot>\n              <\u002Fdiv>\n\n              <!-- top scrim: name + weeks -->\n              <div style=\"position:absolute; top:0; left:0; right:0; padding:46px 46px 60px; background:linear-gradient(180deg, rgba(8,9,12,0.94) 0%, rgba(8,9,12,0.5) 52%, transparent 100%); display:flex; justify-content:space-between; align-items:flex-start;\">\n                <div>\n                  <div style=\"font-family:'JetBrains Mono'; font-size:18px; letter-spacing:5px; text-transform:uppercase; color:#3FD9C0;\">Transformation<\u002Fdiv>\n                  <div style=\"font-family:'Geist'; font-weight:800; font-size:62px; letter-spacing:-2px; line-height:1; color:#F5F6F8; margin-top:13px;\">{{ name }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:rgba(8,9,12,0.5); border:1px solid rgba(255,255,255,0.16); border-radius:14px; padding:14px 18px;\">\n                  <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:28px; color:#F5F6F8; line-height:1;\">{{ weeksLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <!-- bottom labels -->\n              <div style=\"position:absolute; left:0; right:0; bottom:0; padding:28px 30px; display:flex; justify-content:space-between; align-items:flex-end; background:linear-gradient(0deg, rgba(8,9,12,0.82) 0%, transparent 100%);\">\n                <span style=\"font-family:'JetBrains Mono'; font-size:17px; letter-spacing:2px; color:#C3C6CE;\">BEFORE<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono'; font-size:17px; letter-spacing:2px; color:#3FD9C0;\">AFTER<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- stats band -->\n            <div style=\"background:#0A0B0F; border-top:1px solid #23242F; padding:38px 46px; display:flex; flex-direction:column; gap:26px;\">\n              <div style=\"display:flex; align-items:center;\">\n                <div style=\"flex:1;\">\n                  <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:50px; color:{{ bfColor }}; line-height:1;\">{{ bfVal }}<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono'; font-size:16px; letter-spacing:2px; text-transform:uppercase; color:#7E828D; margin-top:11px;\">Body fat<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width:1px; height:66px; background:#23242F;\"><\u002Fdiv>\n                <div style=\"flex:1; padding-left:34px;\">\n                  <div style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:50px; color:{{ lmColor }}; line-height:1;\">{{ lmVal }}<span style=\"font-size:26px; color:#7E828D; margin-left:5px;\">{{ lmUnit }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono'; font-size:16px; letter-spacing:2px; text-transform:uppercase; color:#7E828D; margin-top:11px;\">Lean mass<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:10px;\">\n                  <sc-if value=\"{{ tierChanged }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:10px;\">\n                      <div style=\"font-family:'JetBrains Mono'; font-size:15px; letter-spacing:3px; color:#3FD9C0;\">RANK UP<\u002Fdiv>\n                      <div style=\"display:flex; align-items:center; gap:10px;\">\n                        <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:18px; letter-spacing:1px; color:#E5B83C; background:rgba(229,184,60,0.15); border-radius:8px; padding:7px 12px;\">GOLD<\u002Fspan>\n                        <span style=\"font-family:'JetBrains Mono'; font-size:18px; color:#3FD9C0;\">→<\u002Fspan>\n                        <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:18px; letter-spacing:1px; color:#CFE6F0; background:rgba(207,230,240,0.14); border-radius:8px; padding:7px 12px;\">PLATINUM<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ tierPlaceholder }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:10px;\">\n                      <div style=\"font-family:'JetBrains Mono'; font-size:15px; letter-spacing:3px; color:#7E828D;\">RANK<\u002Fdiv>\n                      <span style=\"font-family:'JetBrains Mono'; font-weight:500; font-size:18px; letter-spacing:1px; color:#7E828D; background:#15161D; border:1px solid #2A2B38; border-radius:8px; padding:7px 16px;\">—<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:flex; justify-content:space-between; align-items:center; padding-top:24px; border-top:1px solid #1C1D26;\">\n                <div style=\"font-family:'JetBrains Mono'; font-size:16px; letter-spacing:2px; color:#7E828D;\">COACHED BY MARIAM K. · SEASON 02<\u002Fdiv>\n                <div style=\"display:flex; flex-direction:column; align-items:flex-end; gap:6px;\">\n                  <div style=\"display:flex; align-items:center; gap:11px;\">\n                    <span style=\"width:15px; height:15px; background:#3FD9C0; border-radius:4px; transform:rotate(45deg); box-shadow:0 0 14px rgba(63,217,192,0.6);\"><\u002Fspan>\n                    <span style=\"font-family:'JetBrains Mono'; font-weight:700; font-size:22px; letter-spacing:4px; color:#3FD9C0;\">RAPTOR<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"font-family:'JetBrains Mono'; font-size:14px; letter-spacing:1px; color:#5C616E;\">train.raptor.app<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { format: '1x1', data: 'full' };\n\n  renderVals() {\n    const C = {\n      onyx:'#0A0B0F', signal:'#3FD9C0', cloud:'#F5F6F8', mist:'#9B9CA8',\n      positive:'#3FD98A',\n    };\n    const fmt = this.state.format;\n    const designH = fmt === '9x16' ? 1920 : fmt === '4x5' ? 1350 : 1080;\n    const dispW = 332;\n    const scale = dispW / 1080;\n    const dispH = Math.round(designH * scale);\n    const full = this.state.data === 'full';\n    const ph = '—';\n\n    return {\n      // format dimensions (runtime — driven by the in-app toggle)\n      designH, dispW, dispH, scale,\n      exportLabel: '1080 × ' + designH,\n\n      // format segmented control\n      f1Bg: fmt === '1x1' ? C.signal : 'transparent',\n      f1Fg: fmt === '1x1' ? C.onyx : C.mist,\n      f2Bg: fmt === '4x5' ? C.signal : 'transparent',\n      f2Fg: fmt === '4x5' ? C.onyx : C.mist,\n      f3Bg: fmt === '9x16' ? C.signal : 'transparent',\n      f3Fg: fmt === '9x16' ? C.onyx : C.mist,\n      setF1: () => this.setState({ format: '1x1' }),\n      setF2: () => this.setState({ format: '4x5' }),\n      setF3: () => this.setState({ format: '9x16' }),\n\n      // data segmented control\n      dFullBg: full ? C.signal : 'transparent',\n      dFullFg: full ? C.onyx : C.mist,\n      dMinBg: !full ? C.signal : 'transparent',\n      dMinFg: !full ? C.onyx : C.mist,\n      setFull: () => this.setState({ data: 'full' }),\n      setMin: () => this.setState({ data: 'minimal' }),\n\n      // card data — with clean placeholders when sparse\n      name: 'Taha',\n      weeksLabel: full ? '16 WK' : ph,\n      bfVal: full ? '−8.4%' : ph,\n      bfColor: full ? C.positive : C.mist,\n      lmVal: full ? '+3.2' : ph,\n      lmUnit: full ? 'kg' : '',\n      lmColor: full ? C.positive : C.mist,\n      tierChanged: full,\n      tierPlaceholder: !full,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
